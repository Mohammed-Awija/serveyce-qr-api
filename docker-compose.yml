services:
  postgres:
    image: postgres:17-alpine
    container_name: roomservice-postgres
    restart: unless-stopped
    ports:
      - '6432:5432'
    environment:
      POSTGRES_USER: roomservice
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: roomservice
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U roomservice']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: