services:
  postgres:
    image: postgres:17-alpine
    container_name: serveyce-qr-postgres
    restart: unless-stopped
    ports:
      - '6432:5432'
    environment:
      POSTGRES_USER: serveyce
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: serveyce
    volumes:
      - serveyce-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U serveyce']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  serveyce-postgres-data: